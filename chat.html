<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #0b0e14;
      --sidebar:     #10141d;
      --surface:     #141920;
      --card:        #191e28;
      --msg-sent:    #00b893;
      --msg-recv:    #1c2336;
      --border:      #242b3a;
      --accent:      #00d4aa;
      --accent-glow: rgba(0,212,170,0.15);
      --text:        #dce8f5;
      --muted:       #60718a;
      --red:         #f05a5a;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
    }

    /* ════════════════════════════════
       SIDEBAR
    ════════════════════════════════ */
    .sidebar {
      width: 290px;
      min-width: 290px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .brand-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 12px;
      color: #0b0e14;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(0,212,170,0.3);
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
    }

    /* Search */
    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 12px 9px 34px;
      outline: none;
      transition: border-color 0.2s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); opacity: 0.6; }

    /* User list */
    .users-label {
      padding: 14px 20px 8px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }
    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .user-item:hover   { background: rgba(255,255,255,0.04); }
    .user-item.active  { background: var(--accent-glow); }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1f6e5a, #0d3a2e);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      flex-shrink: 0;
      position: relative;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .avatar.online { border-color: var(--accent); }
    .avatar.online::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: var(--accent);
      border: 2px solid var(--sidebar);
      border-radius: 50%;
      bottom: -1px; right: -1px;
    }

    .user-meta { flex: 1; min-width: 0; }
    .user-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-id {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      background: var(--accent);
      color: #0b0e14;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }

    /* My profile at bottom */
    .my-profile {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .my-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #0b0e14;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .my-info { flex: 1; min-width: 0; }
    .my-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .my-id {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #logoutBtn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    #logoutBtn:hover { color: var(--red); border-color: var(--red); }

    /* Empty state */
    .empty-users {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ════════════════════════════════
       MAIN CHAT AREA
    ════════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    /* Placeholder when no user selected */
    #chatPlaceholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 14px;
      text-align: center;
      padding: 40px;
    }
    .placeholder-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .placeholder-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
    }
    .placeholder-sub { font-size: 14px; max-width: 280px; }

    /* Active chat wrapper */
    #chatArea {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    /* Chat header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar);
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1f6e5a, #0d3a2e);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
      flex-shrink: 0;
      position: relative;
    }
    .chat-avatar.online::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: var(--accent);
      border: 2px solid var(--sidebar);
      border-radius: 50%;
      bottom: 0; right: 0;
    }
    .chat-info { flex: 1; }
    .chat-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
    }
    .chat-status {
      font-size: 12px;
      color: var(--muted);
    }

    /* Messages */
    #messagesWrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }
    #messagesWrap::-webkit-scrollbar { width: 4px; }
    #messagesWrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .date-divider {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 10px 0;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after  { right: 0; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 68%;
      margin-bottom: 3px;
    }
    .msg.sent  { align-self: flex-end; align-items: flex-end; }
    .msg.recv  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.sent .bubble {
      background: var(--msg-sent);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg.recv .bubble {
      background: var(--msg-recv);
      color: var(--text);
      border-bottom-left-radius: 5px;
      border: 1px solid var(--border);
    }
    .msg-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* Consecutive messages same sender - less gap */
    .msg + .msg.sent,
    .msg + .msg.recv { margin-top: 0; }

    /* Input bar */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--sidebar);
      flex-shrink: 0;
    }
    #messageInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 11px 16px;
      outline: none;
      resize: none;
      max-height: 120px;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    #messageInput:focus { border-color: var(--accent); }
    #messageInput::placeholder { color: var(--muted); opacity: 0.5; }
    #sendBtn {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #0b0e14;
      transition: opacity 0.2s, transform 0.12s;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,212,170,0.3);
    }
    #sendBtn:hover { opacity: 0.9; }
    #sendBtn:active { transform: scale(0.92); }
    #sendBtn svg { width: 18px; height: 18px; }

    /* ════════════════════════════════
       NOTIFICATION BANNER
    ════════════════════════════════ */
    .notif-banner {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 320px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,170,0.12);
      z-index: 9999;
      transform: translateY(-80px);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      cursor: pointer;
    }
    .notif-banner.show {
      transform: translateY(0);
      opacity: 1;
    }
    .notif-dot {
      width: 36px; height: 36px;
      background: var(--accent-glow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .notif-body strong { font-size: 13px; font-weight: 600; display: block; }
    .notif-body span   { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }

    /* Loading state */
    .loading-users {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .dot-pulse {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      margin-top: 10px;
    }
    .dot-pulse span {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Mobile sidebar toggle */
    @media (max-width: 640px) {
      .sidebar { position: fixed; left: -290px; z-index: 100; transition: left 0.3s; height: 100%; }
      .sidebar.open { left: 0; }
      .mobile-menu-btn { display: flex; }
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-mark">TC</div>
      <span class="brand-name">TeamChat</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Search teammates…">
    </div>
  </div>

  <div class="users-label">Team Members</div>

  <div class="user-list" id="userList">
    <div class="loading-users">
      Loading team…
      <div class="dot-pulse"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="my-profile">
    <div class="my-avatar" id="myAvatar">?</div>
    <div class="my-info">
      <div class="my-name" id="myName">—</div>
      <div class="my-id" id="myId">—</div>
    </div>
    <button id="logoutBtn" title="Sign out">Sign out</button>
  </div>
</aside>

<!-- ── MAIN ── -->
<main class="main">

  <!-- Placeholder -->
  <div id="chatPlaceholder">
    <div class="placeholder-icon">💬</div>
    <div class="placeholder-title">Select a teammate to chat</div>
    <p class="placeholder-sub">Messages are delivered instantly.<br>They'll be notified on their device.</p>
  </div>

  <!-- Active chat -->
  <div id="chatArea">
    <div class="chat-header">
      <div class="chat-avatar" id="chatAvatar">?</div>
      <div class="chat-info">
        <div class="chat-name" id="chatUserName">—</div>
        <div class="chat-status" id="chatStatus">Offline</div>
      </div>
    </div>

    <div id="messagesWrap">
      <div id="messages"></div>
    </div>

    <div class="input-bar">
      <textarea id="messageInput" rows="1" placeholder="Type a message… (Enter to send)"></textarea>
      <button id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

</main>

<!-- Firebase SDKs (compat mode) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>

<script src="js/config.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
